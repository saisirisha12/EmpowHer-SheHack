<main class="page-shell">
  <div class="login-shell">
    <p class="app-name">EmpowHer</p>

    <section class="auth-card">
      <div class="top-row">
        <div>
          <h1>Sign in</h1>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <label>
          Email address
          <input type="email" formControlName="email" placeholder="you@example.com" />
        </label>
        <div class="field-error" *ngIf="form.controls['email'].touched && form.controls['email'].invalid">
          <span *ngIf="form.controls['email'].errors?.['required']">Email is required.</span>
          <span *ngIf="form.controls['email'].errors?.['email']">Enter a valid email address.</span>
        </div>

        <label>
          Password
          <input type="password" formControlName="password" placeholder="••••••••" />
        </label>
        <div class="field-error" *ngIf="form.controls['password'].touched && form.controls['password'].invalid">
          <span *ngIf="form.controls['password'].errors?.['required']">Password is required.</span>
          <span *ngIf="form.controls['password'].errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>

        <div class="support-row">
          <button type="button" class="text-action">Forgot password?</button>
        </div>

        <div class="actions">
          <button type="submit" [disabled]="form.invalid || loading">
            {{ loading ? 'Signing in…' : 'Sign in' }}
          </button>
        </div>

        <p class="sign-up-row">
          Don't have an account?
          <button type="button" class="text-action sign-up-action">Sign up</button>
        </p>

        <p class="error-message" *ngIf="error">{{ error }}</p>
      </form>
    </section>
  </div>
</main>
